<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:24px; }
  p { font-family:var(--font-body); font-size:17px; line-height:1.72; color:var(--text); max-width:620px; margin:0 0 12px; }
  p .hl { color:var(--accent); }
  .w { display:flex; gap:24px; font-family:var(--font-mono); font-size:13px; margin-top:8px; }
  .w b { font-weight:400; color:var(--text-muted); }
  .w .x4 { font-weight:400; } .w .x5 { font-weight:500; } .w .x7 { font-weight:700; }
</style></head>
<body>
  <p>What <span class="hl">"let it crash"</span> actually costs once you have 40k processes and a partitioned cluster — and why the answer is rarely a bigger supervisor.</p>
  <div class="w">
    <span class="x4">Regular 400</span><span class="x5">Medium 500</span><span class="x7">Bold 700</span><b>· --font-body · leading-relaxed</b>
  </div>
</body></html>
