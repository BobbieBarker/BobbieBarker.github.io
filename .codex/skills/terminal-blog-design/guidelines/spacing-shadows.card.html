<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Flat by default; the signature is a HARD offset (no blur)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:30px 22px; }
  .row { display:flex; gap:36px; align-items:flex-start; }
  .sw { display:flex; flex-direction:column; gap:16px; align-items:flex-start; }
  .box { width:96px; height:56px; background:var(--surface); border:1px solid var(--border-strong); }
  .meta { font-family:var(--font-mono); font-size:11px; }
  .meta b { color:var(--text); font-weight:500; display:block; }
  .meta span { color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-none)"></div><div class="meta"><b>--shadow-none</b><span>flat default</span></div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-hard-sm)"></div><div class="meta"><b>--shadow-hard-sm</b><span>2px offset</span></div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-hard)"></div><div class="meta"><b>--shadow-hard</b><span>4px offset</span></div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-hard-accent)"></div><div class="meta"><b>--shadow-hard-accent</b><span>orange · hover</span></div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-pop);border-color:var(--border)"></div><div class="meta"><b>--shadow-pop</b><span>menus / dialogs</span></div></div>
  </div>
</body></html>
