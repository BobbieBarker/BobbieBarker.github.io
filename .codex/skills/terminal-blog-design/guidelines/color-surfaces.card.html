<!-- @dsCard group="Colors" viewport="700x150" name="Semantic Surfaces" subtitle="Background, surface and border roles — dark theme" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:20px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:150px; height:60px; border-radius:var(--radius-sm); border:1px solid var(--border); }
  .meta { font-family:var(--font-mono); font-size:11px; }
  .meta b { color:var(--text); font-weight:500; display:block; }
  .meta span { color:var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="meta"><b>--bg</b><span>page</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-sunken)"></div><div class="meta"><b>--bg-sunken</b><span>wells, inputs</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="meta"><b>--surface</b><span>cards</span></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-raised)"></div><div class="meta"><b>--surface-raised</b><span>menus</span></div></div>
    <div class="sw"><div class="chip" style="background:transparent;border-color:var(--border-strong)"></div><div class="meta"><b>--border-strong</b><span>bright rule</span></div></div>
  </div>
</body></html>
