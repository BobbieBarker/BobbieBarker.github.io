<!-- @dsCard group="Brand" viewport="700x260" name="Identity Mark" subtitle="Nameless terminal identity — the >_ mark + a live ~/path prompt" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:28px; display:flex; flex-direction:column; gap:20px; }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .row { display:flex; align-items:center; gap:14px; }
  .mark { width:44px; height:44px; border-radius:var(--radius-md); background:var(--accent); display:flex; align-items:center; justify-content:center; flex:none; }
  .mark span { font-family:var(--font-mono); font-weight:700; font-size:22px; color:var(--accent-contrast); }
  .prompt { font-family:var(--font-mono); font-weight:500; font-size:22px; display:inline-flex; align-items:baseline; }
  .prompt .t { color:var(--accent); } .prompt .p { color:var(--text-secondary); } .prompt .c { color:var(--accent); margin-left:3px; animation:blink 1.1s steps(1) infinite; }
  .prompt .x { color:var(--text); }
  .lt { background:#f5f3ec; padding:16px 18px; border-radius:var(--radius-sm); border:1px solid #d6d1c4; }
  .lt .prompt .x { color:#141414; } .lt .prompt .p { color:#4a4640; } .lt .prompt .t,.lt .prompt .c{ color:#e8431c; }
  .note { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); letter-spacing:0.05em; }
</style></head>
<body>
  <div class="row">
    <div class="mark"><span>&gt;_</span></div>
    <div class="prompt"><span class="t">~</span><span class="p">/writing</span><span class="c">▋</span></div>
  </div>
  <div class="row lt">
    <div class="mark"><span>&gt;_</span></div>
    <div class="prompt"><span class="t">~</span><span class="p">/writing</span><span class="c">▋</span></div>
  </div>
  <div class="note">// no name — the mark is the logo · the path reflects the current section (~/ ~/tags ~/about)</div>
</body></html>
