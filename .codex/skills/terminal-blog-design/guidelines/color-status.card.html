<!-- @dsCard group="Colors" viewport="700x150" name="Status Colors" subtitle="Semantic tones — used sparingly for badges and callouts" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:20px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:150px; height:60px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; }
  .chip span { width:12px; height:12px; border-radius:50%; }
  .meta { font-family:var(--font-mono); font-size:11px; }
  .meta b { color:var(--text); font-weight:500; display:block; }
  .meta i { color:var(--text-muted); font-style:normal; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:color-mix(in srgb,var(--success) 14%,transparent)"><span style="background:var(--success);box-shadow:0 0 8px var(--success)"></span></div><div class="meta"><b>--success</b><i>#5fcf80</i></div></div>
    <div class="sw"><div class="chip" style="background:color-mix(in srgb,var(--warning) 14%,transparent)"><span style="background:var(--warning);box-shadow:0 0 8px var(--warning)"></span></div><div class="meta"><b>--warning</b><i>#e0a83e</i></div></div>
    <div class="sw"><div class="chip" style="background:color-mix(in srgb,var(--danger) 14%,transparent)"><span style="background:var(--danger);box-shadow:0 0 8px var(--danger)"></span></div><div class="meta"><b>--danger</b><i>#f06a5a</i></div></div>
    <div class="sw"><div class="chip" style="background:color-mix(in srgb,var(--info) 14%,transparent)"><span style="background:var(--info);box-shadow:0 0 8px var(--info)"></span></div><div class="meta"><b>--info</b><i>#5aa0f0</i></div></div>
  </div>
</body></html>
