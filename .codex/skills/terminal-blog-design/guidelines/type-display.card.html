<!-- @dsCard group="Type" viewport="700x180" name="Display — Space Mono" subtitle="Headlines, wordmark, big numerics — 700 & 400" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:24px; }
  .big { font-family:var(--font-display); font-weight:700; font-size:42px; letter-spacing:-0.02em; color:var(--text); line-height:1.05; }
  .sub { font-family:var(--font-display); font-weight:400; font-size:18px; color:var(--text-secondary); margin-top:10px; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-top:14px; letter-spacing:0.08em; }
</style></head>
<body>
  <div class="big">Supervision trees<br>are a lie.</div>
  <div class="sub">Space Mono · the characterful display face</div>
  <div class="tag">--font-display · 700 / 400 · tracking-tight</div>
</body></html>
