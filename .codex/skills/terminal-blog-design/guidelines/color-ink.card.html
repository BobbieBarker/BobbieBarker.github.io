<!-- @dsCard group="Colors" viewport="700x170" name="Ink Scale" subtitle="Neutral carbon-to-bone scale — the brutalist greyscale" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:20px; }
  .row { display:flex; gap:0; border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
  .sw { flex:1; height:72px; display:flex; align-items:flex-end; padding:7px; }
  .sw span { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .lbls { display:flex; margin-top:8px; }
  .lbls div { flex:1; font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--black)"></div>
    <div class="sw" style="background:var(--near-black)"></div>
    <div class="sw" style="background:var(--carbon)"></div>
    <div class="sw" style="background:var(--carbon-2)"></div>
    <div class="sw" style="background:var(--line)"></div>
    <div class="sw" style="background:var(--ash)"></div>
    <div class="sw" style="background:var(--smoke)"></div>
    <div class="sw" style="background:var(--fog)"></div>
    <div class="sw" style="background:var(--bone)"></div>
  </div>
  <div class="lbls">
    <div>black</div><div>near-black</div><div>carbon</div><div>carbon-2</div><div>line</div><div>ash</div><div>smoke</div><div>fog</div><div>bone</div>
  </div>
</body></html>
