<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="Strict 4px grid — layouts snap to it" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:22px; display:flex; flex-direction:column; gap:9px; }
  .r { display:flex; align-items:center; gap:14px; }
  .bar { height:16px; background:var(--accent); border-radius:1px; }
  .tk { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); width:150px; flex:none; }
  .tk b { color:var(--text); font-weight:500; }
</style></head>
<body>
  <div class="r"><span class="tk"><b>--space-1</b> · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="tk"><b>--space-2</b> · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="tk"><b>--space-3</b> · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="tk"><b>--space-4</b> · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="tk"><b>--space-5</b> · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="tk"><b>--space-6</b> · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="tk"><b>--space-8</b> · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="tk"><b>--space-10</b> · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="tk"><b>--space-12</b> · 96</span><div class="bar" style="width:96px"></div></div>
</body></html>
