<!-- @dsCard group="Type" viewport="700x140" name="Overline & Labels" subtitle="Uppercase mono labels — the recurring UI texture" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:24px; display:flex; flex-direction:column; gap:16px; }
  .ov { font-family:var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); }
  .ov.acc { color:var(--accent); }
  .row { display:flex; gap:28px; align-items:center; }
  .num { font-family:var(--font-display); font-weight:700; font-size:32px; color:var(--accent); }
</style></head>
<body>
  <div class="row">
    <span class="num">01</span>
    <div style="display:flex;flex-direction:column;gap:7px">
      <span class="ov acc">writing — distributed-systems</span>
      <span class="ov">2026 · 05 · 12 — 14 min read</span>
    </div>
  </div>
  <div class="ov">tracking-wider · 0.15em · uppercase · --text-xs</div>
</body></html>
