<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="display → h1 → h2 → h3 → body → sm → xs" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:22px; }
  .r { display:flex; align-items:baseline; gap:18px; padding:6px 0; border-bottom:1px solid var(--border); }
  .r:last-child { border:none; }
  .tk { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); width:130px; flex:none; letter-spacing:0.05em; }
  .sp { font-family:var(--font-display); font-weight:700; color:var(--text); letter-spacing:-0.01em; white-space:nowrap; }
</style></head>
<body>
  <div class="r"><span class="tk">--text-h1 · 36</span><span class="sp" style="font-size:36px">Distributed by default</span></div>
  <div class="r"><span class="tk">--text-h2 · 26</span><span class="sp" style="font-size:26px">Distributed by default</span></div>
  <div class="r"><span class="tk">--text-h3 · 20</span><span class="sp" style="font-size:20px">Distributed by default</span></div>
  <div class="r"><span class="tk">--text-body-lg · 17</span><span class="sp" style="font-size:17px;font-family:var(--font-body);font-weight:400">Distributed by default</span></div>
  <div class="r"><span class="tk">--text-body · 15</span><span class="sp" style="font-size:15px;font-family:var(--font-body);font-weight:400">Distributed by default</span></div>
  <div class="r"><span class="tk">--text-sm · 13</span><span class="sp" style="font-size:13px;font-family:var(--font-body);font-weight:400;color:var(--text-secondary)">Distributed by default</span></div>
</body></html>
